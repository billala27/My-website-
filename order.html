<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الطلب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Cairo',sans-serif;
  background: radial-gradient(circle at top,#0f0f1a,#050510,#000);
  margin:0;
  padding:0;
  color:#fff;
}

/* الكارد */
.form-container{
  max-width:420px;
  margin:40px auto;
  background: rgba(20,20,35,0.9);
  padding:25px;
  border-radius:18px;
  box-shadow:0 0 25px #00f7ff55, 0 0 60px #ff00ff22;
  border:1px solid rgba(0,247,255,0.3);
  backdrop-filter: blur(10px);
}

/* العنوان */
h2{
  text-align:center;
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff;
}

/* صورة المنتج */
.product-img{
  width:100%;
  height:200px;
  border-radius:12px;
  object-fit:cover;
  margin-bottom:10px;
  border:1px solid #00f7ff33;
}

/* اسم + سعر */
.product-name{
  text-align:center;
  color:#ff00ff;
  margin:10px 0;
  font-size:18px;
}

.price{
  text-align:center;
  color:#00ff88;
  font-size:20px;
  margin-bottom:10px;
}

/* label */
label{
  display:block;
  margin-top:10px;
  margin-bottom:5px;
  font-size:13px;
  color:#00f7ff;
}

/* inputs */
input,select{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #00f7ff55;
  background: rgba(0,0,0,0.4);
  color:#fff;
  outline:none;
  font-size:14px;
}

input:focus,select:focus{
  border-color:#ff00ff;
  box-shadow:0 0 10px #ff00ff;
}

/* زر */
button{
  width:100%;
  padding:15px;
  margin-top:15px;
  background: linear-gradient(45deg,#00f7ff,#ff00ff);
  border:none;
  color:#fff;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00f7ff, 0 0 35px #ff00ff;
}

/* شارة عرض */
.badge{
  display:inline-block;
  background:#ff00ff;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:10px;
  text-align:center;
}
</style>

</head>

<body>

<div class="form-container">

<h2>🛒 إتمام الطلب</h2>

<div class="badge">🔥 عرض خاص</div>

<!-- صورة المنتج -->
<img class="product-img" src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="product">

<div class="product-name" id="productName">...</div>

<div class="price">💰 4900 دج</div>

<label>👤 الاسم الكامل</label>
<input type="text" id="name" required>

<label>📞 رقم الهاتف</label>
<input type="tel" id="phone" required>

<label>📍 الولاية</label>
<select id="state" required>
  <option value="">اختر الولاية</option>

  <option>أدرار</option>
  <option>الشلف</option>
  <option>الأغواط</option>
  <option>أم البواقي</option>
  <option>باتنة</option>
  <option>بجاية</option>
  <option>بسكرة</option>
  <option>بشار</option>
  <option>البليدة</option>
  <option>البويرة</option>
  <option>تمنراست</option>
  <option>تبسة</option>
  <option>تلمسان</option>
  <option>تيارت</option>
  <option>تيزي وزو</option>
  <option>الجزائر</option>
  <option>الجلفة</option>
  <option>جيجل</option>
  <option>سطيف</option>
  <option>سعيدة</option>
  <option>سكيكدة</option>
  <option>سيدي بلعباس</option>
  <option>عنابة</option>
  <option>قالمة</option>
  <option>قسنطينة</option>
  <option>المدية</option>
  <option>مستغانم</option>
  <option>المسيلة</option>
  <option>معسكر</option>
  <option>ورقلة</option>
  <option>وهران</option>
  <option>غرداية</option>
  <option>غليزان</option>
</select>

<label>🏠 العنوان</label>
<input type="text" id="address">

<button onclick="sendOrder()">🚀 تأكيد الطلب الآن</button>

</div>

const product = params.get("product");
