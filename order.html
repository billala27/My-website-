<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب المنتج</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Cairo',sans-serif;
  background: linear-gradient(135deg,#00f7ff,#0072ff);
  margin:0;
  padding:0;
}

.form-container{
  max-width:400px;
  margin:50px auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  color:#0072ff;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  width:100%;
  padding:15px;
  background:linear-gradient(45deg,#ff0000,#ff7300);
  border:none;
  color:#fff;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.product-name{
  background:#f1f1f1;
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin-bottom:15px;
}
</style>

</head>

<body>

<div class="form-container">
  <h2>🛒 إتمام الطلب</h2>

  <div class="product-name" id="productName">...</div>

  <input type="text" id="name" placeholder="اسمك الكامل" required>
  <input type="tel" id="phone" placeholder="رقم الهاتف" required>

  <select id="state">
    <option>اختر الولاية</option>
    <option>وهران</option>
    <option>الجزائر</option>
    <option>عنابة</option>
    <option>سطيف</option>
    <option>تلمسان</option>
    <option>قسنطينة</option>
    <option>الشلف</option>
  </select>

  <input type="text" id="address" placeholder="العنوان الكامل">

  <button onclick="sendOrder()">تأكيد الطلب</button>
</div>

<script>
// جلب اسم المنتج من الرابط
const params = new URLSearchParams(window.location.search);
const product = params.get("product");

document.getElementById("productName").innerText = product || "منتج غير محدد";

// إرسال الطلب
function sendOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let state = document.getElementById("state").value;
  let address = document.getElementById("address").value;

  let message =
`طلب جديد 🔥

🛒 المنتج: ${product}
👤 الاسم: ${name}
📞 الهاتف: ${phone}
📍 الولاية: ${state}
🏠 العنوان: ${address}`;

  let url = "https://wa.me/213795619382?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}
</script>

</body>
</html>
