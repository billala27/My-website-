<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب المنتج</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Cairo',sans-serif;
  background: radial-gradient(circle at top,#0f0f1a,#050510,#000);
  margin:0;
  padding:0;
  color:#fff;
}

/* الحاوية */
.form-container{
  max-width:400px;
  margin:50px auto;
  background: rgba(20,20,35,0.9);
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 25px #00f7ff55, 0 0 60px #ff00ff22;
  border:1px solid rgba(0,247,255,0.3);
  backdrop-filter: blur(10px);
}

/* العنوان */
h2{
  text-align:center;
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff, 0 0 25px #00f7ff;
}

/* اسم المنتج */
.product-name{
  background: rgba(255,255,255,0.05);
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin-bottom:15px;
  color:#ff00ff;
  box-shadow:0 0 10px #ff00ff55;
}

/* label فوق الخانة */
label{
  display:block;
  margin-top:10px;
  margin-bottom:5px;
  font-size:13px;
  color:#00f7ff;
}

/* الحقول */
input,select{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #00f7ff55;
  font-size:14px;
  background: rgba(0,0,0,0.4);
  color:#fff;
  outline:none;
  box-shadow: inset 0 0 10px rgba(0,247,255,0.1);
}

input:focus,select:focus{
  border-color:#ff00ff;
  box-shadow:0 0 10px #ff00ff;
}

/* الزر */
button{
  width:100%;
  padding:15px;
  margin-top:15px;
  background: linear-gradient(45deg,#00f7ff,#ff00ff);
  border:none;
  color:#fff;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 15px #00f7ff55, 0 0 25px #ff00ff33;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00f7ff, 0 0 35px #ff00ff;
}
</style>


</head>

<body>

<div class="form-container">
  <h2>🛒 إتمام الطلب</h2>

  <div class="product-name" id="productName">...</div>

  <input type="text" id="name" placeholder="اسمك الكامل" required>
  <input type="tel" id="phone" placeholder="رقم الهاتف" required>

  <select id="state" required>
    <option value="">📍 اختر الولاية</option>
    <option>أدرار</option>
    <option>الشلف</option>
    <option>الأغواط</option>
    <option>أم البواقي</option>
    <option>باتنة</option>
    <option>بجاية</option>
    <option>بسكرة</option>
    <option>بشار</option>
    <option>البليدة</option>
    <option>البويرة</option>
    <option>تمنراست</option>
    <option>تبسة</option>
    <option>تلمسان</option>
    <option>تيارت</option>
    <option>تيزي وزو</option>
    <option>الجزائر</option>
    <option>الجلفة</option>
    <option>جيجل</option>
    <option>سطيف</option>
    <option>سعيدة</option>
    <option>سكيكدة</option>
    <option>سيدي بلعباس</option>
    <option>عنابة</option>
    <option>قالمة</option>
    <option>قسنطينة</option>
    <option>المدية</option>
    <option>مستغانم</option>
    <option>المسيلة</option>
    <option>معسكر</option>
    <option>ورقلة</option>
    <option>وهران</option>
    <option>البيض</option>
    <option>إليزي</option>
    <option>برج بوعريريج</option>
    <option>بومرداس</option>
    <option>الطارف</option>
    <option>تندوف</option>
    <option>تيسمسيلت</option>
    <option>الوادي</option>
    <option>خنشلة</option>
    <option>سوق أهراس</option>
    <option>تيبازة</option>
    <option>ميلة</option>
    <option>عين الدفلى</option>
    <option>النعامة</option>
    <option>عين تموشنت</option>
    <option>غرداية</option>
    <option>غليزان</option>
  </select>

  <input type="text" id="address" placeholder="العنوان الكامل">

  <button onclick="sendOrder()">تأكيد الطلب</button>
</div>

<script>
// جلب اسم المنتج من الرابط
const params = new URLSearchParams(window.location.search);
const product = params.get("product");

document.getElementById("productName").innerText = product || "منتج غير محدد";

// إرسال الطلب
function sendOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let state = document.getElementById("state").value;
  let address = document.getElementById("address").value;

  let message =
`طلب جديد 🔥

🛒 المنتج: ${product || "غير محدد"}
👤 الاسم: ${name}
📞 الهاتف: ${phone}
📍 الولاية: ${state}
🏠 العنوان: ${address}`;

  let url = "https://wa.me/213795619382?text=" + encodeURIComponent(message);

  window.location.href = url;
}
</script>
<script>
function saveOrder(order) {
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));
}

// مثال عند الضغط على زر "طلب"
function submitOrder() {
  const order = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    status: "قيد المعالجة",
    date: new Date().toLocaleString()
  };

  saveOrder(order);
  alert("تم إرسال الطلب بنجاح");
}
</script>

</body>
</html>
