<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب المنتج</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Cairo',sans-serif;
  background: radial-gradient(circle at top,#0f0f1a,#050510,#000);
  margin:0;
  color:#fff;
}

/* box */
.form-container{
  max-width:400px;
  margin:50px auto;
  background: rgba(20,20,35,0.9);
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 25px #00f7ff55, 0 0 60px #ff00ff22;
  border:1px solid rgba(0,247,255,0.3);
}

/* title */
h2{
  text-align:center;
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff;
}

/* product */
.product-name{
  background: rgba(255,255,255,0.05);
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin-bottom:15px;
  color:#ff00ff;
}

/* labels */
label{
  display:block;
  margin-top:10px;
  font-size:13px;
  color:#00f7ff;
}

/* inputs */
input,select{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #00f7ff55;
  background: rgba(0,0,0,0.4);
  color:#fff;
  margin-top:5px;
}

/* button */
button{
  width:100%;
  padding:15px;
  margin-top:20px;
  background: linear-gradient(45deg,#00f7ff,#ff00ff);
  border:none;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

/* alert */
.alert{
  color:#ff4d4d;
  font-size:13px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="form-container">
  <h2>🛒 إتمام الطلب</h2>

  <div class="product-name" id="productName">...</div>

  <label>👤 الاسم الكامل</label>
  <input type="text" id="name">
  <div id="nameError" class="alert"></div>

  <label>📞 رقم الهاتف</label>
  <input type="tel" id="phone">
  <div id="phoneError" class="alert"></div>

  <label>📍 الولاية</label>
  <select id="state">
    <option value="">اختر الولاية</option>
    <option>وهران</option>
    <option>الجزائر</option>
    <option>سطيف</option>
    <option>قسنطينة</option>
    <option>عنابة</option>
    <!-- باقي الولايات تبقى كما هي -->
  </select>
  <div id="stateError" class="alert"></div>

  <label>🏠 العنوان الكامل</label>
  <input type="text" id="address">

  <button onclick="sendOrder()">تأكيد الطلب</button>
</div>

<script>
// جلب المنتج من الرابط
const params = new URLSearchParams(window.location.search);
let product = params.get("product");

if(!product){
  product = "منتج غير محدد";
}

document.getElementById("productName").innerText = product;

// إرسال الطلب
function sendOrder(){

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let state = document.getElementById("state").value;
  let address = document.getElementById("address").value.trim();

  // reset errors
  document.getElementById("nameError").innerText = "";
  document.getElementById("phoneError").innerText = "";
  document.getElementById("stateError").innerText = "";

  let hasError = false;

  if(name === ""){
    document.getElementById("nameError").innerText = "⚠️ أدخل اسمك";
    hasError = true;
  }

  if(phone === "" || phone.length < 8){
    document.getElementById("phoneError").innerText = "⚠️ رقم غير صحيح";
    hasError = true;
  }

  if(state === ""){
    document.getElementById("stateError").innerText = "⚠️ اختر الولاية";
    hasError = true;
  }

  if(hasError) return;

  let message =
`طلب جديد 🔥

🛒 المنتج: ${product}
👤 الاسم: ${name}
📞 الهاتف: ${phone}
📍 الولاية: ${state}
🏠 العنوان: ${address}`;

  let url = "https://wa.me/213795619382?text=" + encodeURIComponent(message);

  window.location.href = url;
}
</script>

</body>
</html>
