<html lang="ar" dir="rtl">
<head>

  <link rel="stylesheet" href="style.css" />

  <!-- ✨ تأثير رسالة الشكر فقط -->
  <style>
    .custom-box {
      display: inline-block;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: 600;
      color: #222;
      background: #fff;
      border-radius: 12px;
      border: 2px dashed #333;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      font-family: "Tahoma", sans-serif;
      text-align: center;

      opacity: 0;
      transform: translateY(80px);
      transition: all 1.2s ease;
    }

    .custom-box.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<a href="admin.html" class="side-admin-btn">

<header class="hero">

  <a href="tel:0797464694" style="display:inline-block;padding:12px 25px;background:#6c757d;color:white;border-radius:12px;margin:10px;">

  <a href="tel:0795619382" style="display:inline-block;padding:12px 25px;background:#28a745;color:white;border-radius:12px;margin:10px;">

<!-- Slider -->
<section class="slider">
  <div class="slides">
    <img src="images/slider_car.jpg" class="slide">
    <img src="images/slider_motor.jpg" class="slide">
    <img src="images/slider_light.jpg" class="slide">
    <img src="images/slider_bass.jpg" class="slide">
    <img src="images/slider_0mpli.jpg" class="slide">
  </div>
</section>

<script>
let index = 0;
const slides = document.querySelectorAll('.slide');

setInterval(() => {
  slides.forEach((slide, i) => {
    slide.style.display = i === index ? 'block' : 'none';
  });
  index = (index + 1) % slides.length;
}, 3000);
</script>

<h2>موقعنا الجغرافي</h2>

<a href="https://www.google.com/maps?q=R5QC%2BC86+Mesra" target="_blank">
  موقعنا على الخريطة
</a>

<!-- Contact -->
<section id="contact">
  <h2>اتصل بنا</h2>

  <form action="https://formspree.io/f/myzwyrjk" method="POST" style="max-width:500px;margin:auto;">

    <input type="text" name="name" placeholder="الاسم" required style="width:100%;padding:10px;margin:5px 0;">
    <input type="email" name="email" placeholder="البريد الإلكتروني" required style="width:100%;padding:10px;margin:5px 0;">
    <input type="tel" name="phone" placeholder="رقم الهاتف" required style="width:100%;padding:10px;margin:5px 0;">

    <textarea name="message" rows="5" placeholder="اكتب رسالتك هنا" style="width:100%;padding:10px;margin:5px 0;"></textarea>

    <button type="submit" style="background:#28a745;color:white;padding:10px;border:none;">
      إرسال
    </button>
  </form>
</section>

<!-- Footer -->
<footer class="footer-box">
  <p>© 2025 جميع الحقوق محفوظة</p>
</footer>

<!-- ⭐ رسالة الشكر -->
<div class="custom-box" id="thanks">
  شكراً على زيارتك موقعي
</div>

<!-- ⭐ تفعيل الحركة عند الوصول -->
<script>
const thanks = document.getElementById("thanks");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      thanks.classList.add("show");
    }
  });
});

observer.observe(thanks);
</script>

</body>
</html>
