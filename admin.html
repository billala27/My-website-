<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم الاحترافية</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* العنوان */
h2 {
  text-align: center;
  color: #00f5ff;
  text-shadow: 0 0 10px #00f5ff;
}

/* 🔥 الإحصائيات */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.stat {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,245,255,0.2);
}

.stat h3 {
  margin: 0;
  color: #00f5ff;
}

/* 🔍 البحث */
input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
  outline: none;
}

/* الحاوية */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 15px;
}

/* الكرت */
.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 15px;
  border: 1px solid rgba(0,245,255,0.2);
  box-shadow: 0 0 10px rgba(0,245,255,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px rgba(0,245,255,0.5);
}

.status {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  display: inline-block;
}

.pending { background: orange; }
.shipped { background: limegreen; }
.cancel { background: red; }

button {
  margin-top: 8px;
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

button:nth-child(1) {
  background: #00f5ff;
}

button:nth-child(2) {
  background: #ff004c;
}
</style>
</head>

<body>

<h2>📦 لوحة التحكم الاحترافية</h2>

<!-- 📊 الإحصائيات -->
<div class="stats">
  <div class="stat">
    <h3 id="total">0</h3>
    <p>كل الطلبات</p>
  </div>

  <div class="stat">
    <h3 id="pending">0</h3>
    <p>قيد المعالجة</p>
  </div>

  <div class="stat">
    <h3 id="shipped">0</h3>
    <p>تم الشحن</p>
  </div>
</div>

<!-- 🔍 بحث -->
<input type="text" id="search" placeholder="ابحث باسم الزبون...">

<!-- 📦 الطلبات -->
<div class="container" id="orders"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

/* 🔔 إشعار عند طلب جديد */
if(localStorage.getItem("newOrder") === "1"){
  alert("📦 لديك طلب جديد!");
  localStorage.removeItem("newOrder");
}

function render(data){
  const container = document.getElementById("orders");

  container.innerHTML = "";

  data.forEach((o, i) => {

    let cls = o.status === "تم الشحن" ? "shipped"
            : o.status === "ملغى" ? "cancel"
            : "pending";

    container.innerHTML += `
      <div class="card">
        <p>👤 ${o.name}</p>
        <p>📞 ${o.phone}</p>
        <p>📍 ${o.address}</p>

        <span class="status ${cls}">${o.status}</span>

        <br>

        <button onclick="update(${i}, 'تم الشحن')">شحن</button>
        <button onclick="update(${i}, 'ملغى')">إلغاء</button>
      </div>
    `;
  });

  updateStats();
}

function update(index, status){
  orders[index].status = status;
  localStorage.setItem("orders", JSON.stringify(orders));
  render(orders);
}

/* 📊 الإحصائيات */
function updateStats(){
  document.getElementById("total").innerText = orders.length;
  document.getElementById("pending").innerText =
    orders.filter(o => o.status === "قيد المعالجة").length;

  document.getElementById("shipped").innerText =
    orders.filter(o => o.status === "تم الشحن").length;
}

/* 🔍 البحث */
document.getElementById("search").addEventListener("input", function(){
  let value = this.value.toLowerCase();

  let filtered = orders.filter(o =>
    o.name.toLowerCase().includes(value)
  );

  render(filtered);
});

render(orders);
</script>

</body>
</html>
